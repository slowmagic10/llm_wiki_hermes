services:
  rag-api:
    build:
      context: ./services/obsidian-rag-mcp
      network: host
    image: llm-wiki-rag:local
    container_name: llm-wiki-rag-api
    restart: unless-stopped
    env_file:
      - /etc/obsidian-rag-mcp.env
    environment:
      VAULT_PATH: /root/llm_wiki_hermes/vault
      DATABASE_URL: postgresql://rag:rag@postgres:5432/rag
      LITELLM_BASE_URL: http://172.19.0.1:14000/v1
      MODEL_SETTINGS_PATH: /root/llm_wiki_hermes/config/model-settings.json
      VECTOR_BACKEND: milvus
      MILVUS_URI: http://milvus:19530
      MILVUS_COLLECTION: llm_wiki_chunks_v2
      FINAL_ANSWER_MODE: deterministic
      NO_PROXY: "*"
      no_proxy: "*"
    volumes:
      - /root/llm_wiki_hermes/vault:/root/llm_wiki_hermes/vault:ro
      - /root/llm_wiki_hermes/config:/root/llm_wiki_hermes/config:ro
    ports:
      - "18080:18080"
    networks:
      - default
      - postgres_net
    depends_on:
      milvus:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - 'import urllib.request; urllib.request.urlopen("http://127.0.0.1:18080/health", timeout=5).read()'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  mcp-bridge:
    image: llm-wiki-rag:local
    container_name: llm-wiki-mcp-bridge
    restart: unless-stopped
    depends_on:
      rag-api:
        condition: service_started
    env_file:
      - /etc/obsidian-rag-mcp.env
    environment:
      VAULT_PATH: /root/llm_wiki_hermes/vault
      DATABASE_URL: postgresql://rag:rag@postgres:5432/rag
      LITELLM_BASE_URL: http://172.19.0.1:14000/v1
      MODEL_SETTINGS_PATH: /root/llm_wiki_hermes/config/model-settings.json
      VECTOR_BACKEND: milvus
      MILVUS_URI: http://milvus:19530
      MILVUS_COLLECTION: llm_wiki_chunks_v2
      FINAL_ANSWER_MODE: deterministic
      NO_PROXY: "*"
      no_proxy: "*"
    volumes:
      - /root/llm_wiki_hermes/vault:/root/llm_wiki_hermes/vault:ro
      - /root/llm_wiki_hermes/config:/root/llm_wiki_hermes/config:ro
    ports:
      - "127.0.0.1:18081:18081"
    networks:
      - default
      - postgres_net
    command:
      - python
      - -m
      - app.mcp_server

  admin-web:
    build:
      context: ./services/admin-web
      network: host
    image: llm-wiki-admin-web:local
    container_name: llm-wiki-admin-web
    restart: unless-stopped
    depends_on:
      rag-api:
        condition: service_started
    env_file:
      - /etc/obsidian-rag-mcp.env
    environment:
      PROJECT_ROOT: /root/llm_wiki_hermes
      VAULT_PATH: /root/llm_wiki_hermes/vault
      RAG_BASE_URL: http://rag-api:18080
      DATABASE_URL: postgresql://rag:rag@postgres:5432/rag
      LITELLM_BASE_URL: http://172.19.0.1:14000/v1
      MODEL_SETTINGS_PATH: /root/llm_wiki_hermes/config/model-settings.json
      SYNC_SCRIPT: /root/llm_wiki_hermes/bin/sync_vault_and_rag_container.sh
      SERVICE_MODE: docker
      VECTOR_BACKEND: milvus
      MILVUS_URI: http://milvus:19530
      MILVUS_COLLECTION: llm_wiki_chunks_v2
      FINAL_ANSWER_MODE: deterministic
      NO_PROXY: "*"
      no_proxy: "*"
    volumes:
      - /root/llm_wiki_hermes/vault:/root/llm_wiki_hermes/vault
      - /root/llm_wiki_hermes/logs:/root/llm_wiki_hermes/logs
      - /root/llm_wiki_hermes/config:/root/llm_wiki_hermes/config
      - /root/llm_wiki_hermes/bin:/root/llm_wiki_hermes/bin:ro
      - /root/llm_wiki_hermes/docs:/root/llm_wiki_hermes/docs:ro
      - /root/llm_wiki_hermes/obsidian-wiki-config:/root/.obsidian-wiki
      - /root/.ssh:/root/.ssh:ro
    ports:
      - "18090:18090"
    networks:
      - default
      - postgres_net
    command:
      - /bin/sh
      - -lc
      - 'obsidian-wiki setup --vault /root/llm_wiki_hermes/vault >/tmp/obsidian-wiki-setup.log 2>&1 || true; exec python -m uvicorn main:app --host 0.0.0.0 --port 18090'
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - 'import urllib.request; urllib.request.urlopen("http://127.0.0.1:18090/health", timeout=5).read()'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  sync-runner:
    image: alpine/git:latest
    container_name: llm-wiki-sync-runner
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - /root/llm_wiki_hermes/bin/sync_loop_container.sh
    depends_on:
      rag-api:
        condition: service_started
    environment:
      RAG_BASE_URL: http://rag-api:18080
      SYNC_INTERVAL_SECONDS: "86400"
      NO_PROXY: "*"
      no_proxy: "*"
    volumes:
      - /root/llm_wiki_hermes/vault:/root/llm_wiki_hermes/vault
      - /root/llm_wiki_hermes/logs:/root/llm_wiki_hermes/logs
      - /root/llm_wiki_hermes/bin:/root/llm_wiki_hermes/bin:ro
      - /root/.ssh:/root/.ssh:ro
    networks:
      - default

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: llm-wiki-milvus-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - milvus_etcd_data:/etcd
    command:
      - etcd
      - --advertise-client-urls=http://127.0.0.1:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    networks:
      - default

  minio:
    image: harbor.cm.cluster:9443/docker.io/minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: llm-wiki-milvus-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - milvus_minio_data:/minio_data
    command:
      - minio
      - server
      - /minio_data
      - --console-address
      - ":9001"
    networks:
      - default

  milvus:
    image: harbor.cm.cluster:9443/docker.io/milvusdb/milvus:v2.4.15
    container_name: llm-wiki-milvus
    restart: unless-stopped
    command:
      - milvus
      - run
      - standalone
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "127.0.0.1:19530:19530"
      - "127.0.0.1:9091:9091"
    depends_on:
      - etcd
      - minio
    networks:
      - default

networks:
  postgres_net:
    external: true
    name: postgress_default

volumes:
  milvus_etcd_data:
  milvus_minio_data:
  milvus_data:
